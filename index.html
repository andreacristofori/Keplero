<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keplero: Orbite Ellittiche</title>
    
    <script>
        window.addEventListener('error', function(event) {
            const err = document.createElement('div');
            err.style.cssText = 'position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:10px;font-size:12px;font-family:monospace;width:100%;';
            err.textContent = 'Error: ' + event.message + ' at ' + event.filename + ':' + event.lineno;
            document.body.appendChild(err);
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #050505;
            color: #d1d5db;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .hud-border {
            position: relative;
            border: 1px solid rgba(34, 211, 238, 0.2);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
        }
        .hud-border::before, .hud-border::after, .hud-border .corner-bl, .hud-border .corner-br {
            content: ''; position: absolute; width: 8px; height: 8px; border-color: #22d3ee; border-style: solid;
        }
        .hud-border::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .hud-border::after { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .hud-border .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
        .hud-border .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
        input[type="range"] { -webkit-appearance: none; background: rgba(34, 211, 238, 0.1); height: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #22d3ee; }
    </style>
</head>
<body class="bg-[#050505] text-[#d1d5db] select-none">
    <div id="root"></div>

    <script>
        const { useEffect, useRef, useState, useMemo } = React;
        const e = React.createElement;

        const COLORS = {
            mercurio: '#55ffff', venere: '#55ff55', terra: '#5555ff', marte: '#ff5555',
            giove: '#00aa00', saturno: '#00aaaa', luna: '#ffffff', sole: '#ffff00', star: '#4c4c00'
        };

        const PLANETS_DATA = {
            mercurio: { a: 38.7, e: 0.2056, inc: 7.0 / 57.3, long: 77.1 / 57.3, p: 87.9, color: COLORS.mercurio },
            venere:   { a: 72.3, e: 0.0067, inc: 3.4 / 57.3, long: 131.2 / 57.3, p: 224.7, color: COLORS.venere },
            terra:    { a: 100,  e: 0.0167, inc: 0,        long: 102.5 / 57.3, p: 365.2, color: COLORS.terra },
            marte:    { a: 140,  e: 0.0933, inc: 1.8 / 57.3, long: 335.6 / 57.3, p: 687.0, color: COLORS.marte },
            giove:    { a: 180,  e: 0.0484, inc: 1.3 / 57.3, long: 14.0 / 57.3,  p: 4332.6, color: COLORS.giove },
            saturno:  { a: 210,  e: 0.0556, inc: 2.5 / 57.3, long: 92.6 / 57.3,  p: 10759.2, color: COLORS.saturno },
            luna:     { a: 15,   e: 0.0549, inc: 0,        long: 0,          p: 27.3,    color: COLORS.luna }
        };

        function App() {
            const canvasRef = useRef(null);
            const [vis, setVis] = useState({
                mercurio: false, venere: true, terra: true, luna: false,
                marte: true, giove: false, saturno: false,
                traccia: true, nomi: true, stelleFisse: true 
            });
            const [simulationSpeed, setSimulationSpeed] = useState(1.0);
            const [isRunning, setIsRunning] = useState(true);
            const [zoom, setZoom] = useState(1.0);
            const [showHelp, setShowHelp] = useState(false);
            const [helpPage, setHelpPage] = useState(0);

            const anglesRef = useRef({ mercurio: 0, venere: 0, terra: 0, marte: 0, giove: 0, saturno: 0, luna: 0 });
            const tracesRef = useRef({ mercurio: [], venere: [], terra: [], marte: [], giove: [], saturno: [], luna: [] });

            const starSphereRef = useRef(Array.from({ length: 1500 }, () => ({
                angle: Math.random() * Math.PI * 2, variance: Math.random() * 10 - 5
            })));

            const toggleOption = (target) => {
                if (target === 'traccia') {
                    setVis(prev => {
                        if (!prev.traccia) Object.keys(tracesRef.current).forEach(k => tracesRef.current[k] = []);
                        return Object.assign({}, prev, { traccia: !prev.traccia });
                    });
                } else {
                    setVis(prev => Object.assign({}, prev, { [target]: !prev[target] }));
                }
            };

            const stars = useMemo(() => Array.from({ length: 500 }, () => ({
                x: Math.random() * 2000, y: Math.random() * 2000, size: Math.random() * 1.5
            })), []);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const render = () => {
                    const W = canvas.width; const H = canvas.height;
                    const mx = W * 0.6; const my = H / 2;

                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, W, H);

                    ctx.fillStyle = COLORS.star;
                    stars.forEach(s => { ctx.fillRect(s.x % W, s.y % H, s.size, s.size); });

                    if (vis.stelleFisse) {
                        const sphereRadius = 800 * zoom;
                        ctx.save(); ctx.translate(mx, my); ctx.fillStyle = '#22d3ee';
                        starSphereRef.current.forEach(point => {
                            ctx.globalAlpha = 0.3 + Math.random() * 0.4;
                            const r = sphereRadius + (point.variance * 3) * zoom;
                            ctx.fillRect(Math.cos(point.angle) * r, Math.sin(point.angle) * r, 1.2, 1.2);
                        });
                        ctx.restore(); ctx.globalAlpha = 1.0;
                    }

                    let posTerra = { x: 0, y: 0 };

                    Object.entries(PLANETS_DATA).forEach(([p, d]) => {
                        if (p === 'luna') return;
                        const b = d.a * Math.sqrt(1 - d.e ** 2);
                        const f = d.a * d.e * Math.cos(d.inc);
                        if (isRunning) anglesRef.current[p] += (2.0 * simulationSpeed) / d.p;

                        const lx = d.a * Math.cos(anglesRef.current[p]) * Math.cos(d.inc);
                        const ly = b * Math.sin(anglesRef.current[p]);
                        const scale = 2 * zoom;
                        const fx = mx + ((lx - f) * Math.cos(-d.long) + ly * Math.sin(-d.long)) * scale;
                        const fy = my + (-(lx - f) * Math.sin(-d.long) + ly * Math.cos(-d.long)) * scale;

                        if (p === 'terra') posTerra = { x: fx, y: fy };

                        if (vis[p]) {
                            if (vis.traccia) {
                                tracesRef.current[p].push({ rx: (fx - mx), ry: (fy - my) });
                                if (tracesRef.current[p].length > 3000) tracesRef.current[p].shift();
                                ctx.fillStyle = d.color; ctx.globalAlpha = 0.3;
                                tracesRef.current[p].forEach(pt => { ctx.fillRect(mx + pt.rx, my + pt.ry, 1, 1); });
                                ctx.globalAlpha = 1.0;
                            }
                            ctx.beginPath(); ctx.arc(fx, fy, Math.max(1, 4 * Math.sqrt(zoom)), 0, Math.PI * 2);
                            ctx.fillStyle = d.color; ctx.fill();
                            if (vis.nomi) {
                                ctx.font = '11px JetBrains Mono'; ctx.fillStyle = d.color;
                                ctx.fillText(p.toUpperCase(), fx + 10, fy - 10);
                            }
                        }
                    });

                    ctx.beginPath(); ctx.arc(mx, my, Math.max(2, 8 * Math.sqrt(zoom)), 0, Math.PI * 2);
                    ctx.fillStyle = COLORS.sole; ctx.fill();

                    if (vis.luna && vis.terra) {
                        const dLuna = PLANETS_DATA.luna;
                        if (isRunning) anglesRef.current.luna += (2.0 * simulationSpeed) / dLuna.p;
                        const lx = posTerra.x + (dLuna.a * Math.cos(anglesRef.current.luna)) * 1.5 * zoom;
                        const ly = posTerra.y + (dLuna.a * Math.sin(anglesRef.current.luna)) * 1.5 * zoom;

                        if (vis.traccia) {
                            tracesRef.current.luna.push({ rx: (lx - mx), ry: (ly - my) });
                            if (tracesRef.current.luna.length > 400) tracesRef.current.luna.shift();
                            ctx.fillStyle = '#ffffff'; ctx.globalAlpha = 0.3;
                            tracesRef.current.luna.forEach(pt => { ctx.fillRect(mx + pt.rx, my + pt.ry, 1, 1); });
                            ctx.globalAlpha = 1.0;
                        }
                        ctx.beginPath(); ctx.arc(lx, ly, Math.max(1, 2 * Math.sqrt(zoom)), 0, Math.PI * 2);
                        ctx.fillStyle = '#ffffff'; ctx.fill();
                    }

                    animationFrameId = requestAnimationFrame(render);
                };

                render();
                return () => cancelAnimationFrame(animationFrameId);
            }, [vis, stars, simulationSpeed, isRunning, zoom]);

            useEffect(() => {
                const handleResize = () => {
                    if (canvasRef.current) {
                        canvasRef.current.width = window.innerWidth;
                        canvasRef.current.height = window.innerHeight;
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize();
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const helpPages = [
                {
                    title: "GIOVANNI KEPLERO (1571-1630)",
                    content: ["Giovanni Keplero svelò la Meccanica del Sistema Solare.", "Scoprì le sue famose leggi enunciate nelle opere 'Astronomia Nova' (1609) ed 'Harmonices Mundi' (1618)."]
                },
                {
                    title: "LA PRIMA LEGGE DI KEPLERO",
                    content: ["\"LE ORBITE DEI PIANETI SONO ELLISSI - IL SOLE GIACE IN UNO DEI FUOCHI\""]
                }
            ];

            return e('div', { className: "relative w-full h-screen bg-[#050505] overflow-hidden font-mono text-[#d1d5db] select-none text-[12px] uppercase" },
                e('canvas', { ref: canvasRef, className: "absolute inset-0 z-0" }),
                
                e('div', { className: "absolute top-0 left-0 w-full p-8 flex justify-between items-start z-10 pointer-events-none" },
                    e('div', { className: "pointer-events-auto" },
                        e('div', { className: "text-[10px] text-[#22d3ee] font-bold tracking-[0.4em] mb-1" }, "ANDREA CRISTOFORI"),
                        e('h1', { className: "text-xl md:text-2xl font-bold text-white tracking-[0.1em]" },
                            e('span', { className: "text-[#22d3ee]" }, "Keplero"),
                            e('span', { className: "font-light italic ml-1" }, " e le orbite ellittiche")
                        )
                    )
                ),

                e('div', { className: "absolute top-24 left-6 bottom-8 w-60 flex flex-col gap-3 z-10" },
                    e('div', { className: "p-2.5 hud-border flex-1 flex flex-col min-h-0" },
                        e('div', { className: "corner-bl" }), e('div', { className: "corner-br" }),
                        e('div', { className: "text-[#22d3ee] font-bold border-b border-[#22d3ee]/20 pb-2 tracking-[0.15em] text-[10px] mb-2" }, "⚙ OGGETTI CELESTI"),
                        e('div', { className: "flex-1 overflow-y-auto space-y-1.5" },
                            Object.keys(PLANETS_DATA).map(key => 
                                e('div', { key: key, className: "flex items-center gap-3 cursor-pointer py-1 px-2 hover:bg-white/5", onClick: () => toggleOption(key) },
                                    e('div', { className: "w-3 h-3 border", style: { backgroundColor: vis[key] ? PLANETS_DATA[key].color : 'transparent', borderColor: vis[key] ? PLANETS_DATA[key].color : '#374151' } }),
                                    e('span', { className: `text-[10px] tracking-widest ${vis[key] ? 'text-white' : 'text-gray-600'}` }, key)
                                )
                            )
                        )
                    ),

                    e('div', { className: "p-2.5 hud-border" },
                        e('div', { className: "corner-bl" }), e('div', { className: "corner-br" }),
                        e('div', { className: "text-[#22d3ee] font-bold border-b border-[#22d3ee]/20 pb-1 text-[10px] mb-2" }, "👁 VISIBILITÀ"),
                        e('div', { className: "grid grid-cols-2 gap-2" },
                            e('button', { onClick: () => toggleOption('traccia'), className: `py-1 text-[9px] font-bold border ${vis.traccia ? 'bg-[#22d3ee]/20 border-[#22d3ee] text-white' : 'border-gray-700 text-gray-600'}` }, "ORBITE"),
                            e('button', { onClick: () => toggleOption('nomi'), className: `py-1 text-[9px] font-bold border ${vis.nomi ? 'bg-[#22d3ee]/20 border-[#22d3ee] text-white' : 'border-gray-700 text-gray-600'}` }, "NOMI")
                        )
                    ),

                    e('div', { className: "p-2.5 hud-border" },
                        e('div', { className: "corner-bl" }), e('div', { className: "corner-br" }),
                        e('div', { className: "text-[#22d3ee] font-bold border-b border-[#22d3ee]/20 pb-1 text-[10px] mb-2" }, `⏱ TEMPO (${simulationSpeed.toFixed(1)}X)`),
                        e('input', { type: "range", min: "0", max: "10", step: "0.5", value: simulationSpeed, onChange: (e) => setSimulationSpeed(parseFloat(e.target.value)), className: "w-full accent-[#22d3ee]" })
                    ),

                    e('button', { onClick: () => setShowHelp(true), className: "bg-[#22d3ee] text-black font-bold py-2 tracking-[0.4em] text-[10px] hover:bg-white transition-all" }, "GUIDA")
                ),

                showHelp && e('div', { className: "fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90 backdrop-blur-md" },
                    e('div', { className: "bg-[#0a0a0a] border-2 border-cyan-400/30 max-w-lg w-full p-6 relative" },
                        e('button', { onClick: () => setShowHelp(false), className: "absolute top-4 right-4 text-cyan-400/50 hover:text-cyan-400 font-bold" }, "[X]"),
                        e('h2', { className: "text-md font-bold text-cyan-300 mb-4 tracking-[0.2em] border-b border-cyan-400/20" }, helpPages[helpPage].title),
                        e('div', { className: "text-gray-400 space-y-2 normal-case" }, helpPages[helpPage].content.map((l, i) => e('p', { key: i }, l)))
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
